# Lightweight Telegram /live /upstox_token polling — triggered every ~2 min by cron-job.org
name: Telegram Commands

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-commands
  cancel-in-progress: false

jobs:
  poll:
    # Disabled: GCP VM runs telegram_command_listener 24/7. Enabling this causes getUpdates Conflict.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
      TELEGRAM_COMMANDS_ENABLED: "true"
      UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
      UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
      UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
      UPSTOX_REDIRECT_URI: ${{ secrets.UPSTOX_REDIRECT_URI }}
      SCANNER_DATA_DIR: data
    steps:
      - uses: actions/checkout@v4

      - name: IST date for cache
        id: ist_date
        run: echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
          restore-keys: scanner-data-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Poll Telegram commands (~100s)
        run: |
          mkdir -p data
          python scripts/telegram_command_listener.py --seconds 100 --interval 1.5
