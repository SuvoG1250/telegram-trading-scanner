# Scans every 5 min until NSE close. GitHub schedule often does NOT fire — use
# scripts/install_windows_autoscan.ps1 on your PC OR cron-job.org (AUTOMATION.txt).

name: Auto Trading Bot

on:
  schedule:
    - cron: "45 3 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "full_session = loop every 5 min | scan_once = single scan"
        required: false
        default: "full_session"
        type: choice
        options:
          - full_session
          - scan_once
      max_minutes:
        description: "Loop length (full_session only); 0 = until market close"
        required: false
        default: "0"

permissions:
  contents: read

concurrency:
  group: intraday-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 400
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
      DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
      DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
      UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
      UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
      UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
      FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
      FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      OPTION_DATA_PROVIDER: upstox
      NIFTY_ST_ENGINE: exit490
      NIFTY_EXIT490_ATR_BARS: "1"
      NIFTY_EXIT490_ATR_MULT: "3"
      NIFTY_OPTION_PREMIUM_SL_POINTS: "15"
      NIFTY_OPTION_PREMIUM_TARGET_POINTS: "30"
      NIFTY_OPTION_PREMIUM_TRAIL_MAX_POINTS: "100"
      SCAN_UNIVERSE_MODE: nse_price_band
      MIN_STOCK_PRICE: "100"
      MAX_STOCK_PRICE: "1500"
      SEND_SCAN_SUMMARY: "false"
      SEND_DAILY_SUMMARY: "true"
      SEND_SESSION_ALERTS: "true"
      NIFTY_OPTIONS_ENABLED: "true"
      USE_TRADE_FILTERS: "true"
      REQUIRE_FNO_ELIGIBLE: "true"
      REQUIRE_INTRADAY_MARGIN: "true"
      SCAN_STRATEGIES: all
      MIN_STRATEGIES_TO_CONFIRM: "1"
      MIN_STOCK_MOVE_POTENTIAL_PCT: "2"
      MIN_TARGET_PROFIT_PCT: "2"
      EMA_MIN_TARGET_PROFIT_PCT: "2"
      EMA_MAX_TARGET_PROFIT_PCT: "3"
      EMA_MAX_SL_PCT: "0.5"
      MAX_DAILY_BUY_SIGNALS: "10"
      MAX_BUY_ALERTS_PER_SCAN: "1"
      MAX_SELL_ALERTS_PER_SCAN: "1"
      SLTP_CLOSE_ALERT_TELEGRAM: "false"
      SCANNER_DATA_DIR: data
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      GITHUB_ACTIONS: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Log run
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "IST: $(TZ=Asia/Kolkata date '+%A %Y-%m-%d %H:%M:%S %Z')"

      - name: IST date for cache
        id: ist_date
        run: echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
          restore-keys: scanner-data-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Minutes until market close (IST)
        id: duration
        run: |
          NOW=$(TZ=Asia/Kolkata date +%s)
          CLOSE=$(TZ=Asia/Kolkata date -d "15:30" +%s 2>/dev/null || TZ=Asia/Kolkata date -d "$(TZ=Asia/Kolkata date +%Y-%m-%d) 15:30:00" +%s)
          DIFF=$(( (CLOSE - NOW) / 60 ))
          if [ "$DIFF" -lt 30 ]; then DIFF=30; fi
          if [ "$DIFF" -gt 390 ]; then DIFF=390; fi
          echo "mins=$DIFF" >> "$GITHUB_OUTPUT"
          echo "Minutes until 15:30 IST: $DIFF"

      - name: Refresh NSE universe (Rs 100-1500)
        run: python scripts/refresh_nse_universe.py

      - name: Automation boot (once per day)
        run: python automation_boot.py

      - name: Single scan
        if: github.event.inputs.mode == 'scan_once'
        run: |
          mkdir -p data
          python scanner.py

      - name: Scan loop every 5 min until market close
        if: github.event_name == 'schedule' || github.event.inputs.mode != 'scan_once'
        run: |
          mkdir -p data
          MINS="${{ github.event.inputs.max_minutes }}"
          if [ -z "$MINS" ] || [ "$MINS" = "0" ]; then
            MINS="${{ steps.duration.outputs.mins }}"
          fi
          echo "Running session loop for $MINS minutes"
          python session_runner.py --max-minutes "$MINS"
