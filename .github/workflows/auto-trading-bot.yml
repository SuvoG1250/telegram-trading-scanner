# Full automatic trading bot — 2 reliable cron triggers per day (morning + afternoon).
# Each job runs a loop: scan every 5 min + Telegram START/STOP/signals.
# No manual runs needed on trading days.

name: Auto Trading Bot

on:
  schedule:
    # 9:10 AM IST (3:40 UTC) — morning session loop until ~2:40 PM IST
    - cron: "40 3 * * 1-5"
    # 2:45 PM IST (9:15 UTC) — afternoon loop until market close
    - cron: "15 9 * * 1-5"
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Loop duration (minutes); default 320 for full morning"
        required: false
        default: "15"

permissions:
  contents: read

concurrency:
  group: auto-trading-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  market-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
      SCANNER_DATA_DIR: data
    steps:
      - uses: actions/checkout@v4

      - name: IST date for cache
        id: ist_date
        run: echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
          restore-keys: scanner-data-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Set loop duration (IST)
        id: duration
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mins=${{ github.event.inputs.max_minutes }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(TZ=Asia/Kolkata date +%H)
            if [ "$HOUR" -lt 14 ]; then
              echo "mins=320" >> "$GITHUB_OUTPUT"
            else
              echo "mins=55" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run full market session loop
        run: |
          mkdir -p data
          echo "Loop ${{ steps.duration.outputs.mins }} min | IST $(TZ=Asia/Kolkata date)"
          python session_runner.py --max-minutes "${{ steps.duration.outputs.mins }}"
