# Full automatic NSE scanner — Mon–Fri, no manual clicks needed.
# Triggers: GitHub schedule (9:05 + 14:50 IST) | manual Run workflow | external cron-job.org

name: Auto Trading Bot

on:
  schedule:
    # 9:05 AM IST (03:35 UTC) — full session until market close
    - cron: "35 3 * * 1-5"
    # 2:50 PM IST (09:20 UTC) — backup if morning was missed
    - cron: "20 9 * * 1-5"
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Loop duration (minutes); 390 = full session"
        required: false
        default: "390"
  repository_dispatch:
    types: [run-session]

permissions:
  contents: read

concurrency:
  group: auto-trading-session
  cancel-in-progress: false

jobs:
  market-session:
    runs-on: ubuntu-latest
    timeout-minutes: 400
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
      SCANNER_DATA_DIR: data
      GITHUB_EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Log trigger (automatic vs manual)
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "IST: $(TZ=Asia/Kolkata date '+%A %Y-%m-%d %H:%M:%S %Z')"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "✅ AUTOMATIC scheduled run"
          else
            echo "Manual or external trigger"
          fi

      - name: IST date for cache
        id: ist_date
        run: echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
          restore-keys: scanner-data-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Set loop duration
        id: duration
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MINS="${{ github.event.inputs.max_minutes }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MINS="${{ github.event.client_payload.max_minutes }}"
            if [ -z "$MINS" ] || [ "$MINS" = "null" ]; then
              MINS=390
            fi
          else
            HOUR=$(TZ=Asia/Kolkata date +%H)
            MIN=$(TZ=Asia/Kolkata date +%M)
            if [ "$HOUR" -lt 14 ] || { [ "$HOUR" -eq 14 ] && [ "$MIN" -lt 30 ]; }; then
              MINS=390
            else
              MINS=90
            fi
          fi
          echo "mins=$MINS" >> "$GITHUB_OUTPUT"
          echo "Loop: $MINS minutes"

      - name: Automation boot (Telegram proof)
        run: python automation_boot.py

      - name: Run full market session loop
        run: |
          mkdir -p data
          python session_runner.py --max-minutes "${{ steps.duration.outputs.mins }}"
