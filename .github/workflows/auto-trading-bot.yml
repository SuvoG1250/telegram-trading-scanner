# One daily full_session via cron-job.org (9:15 IST). Internal scan every 3 min.
# Do not use install_windows_autoscan.ps1 — use scripts/setup_cron_job_org.py

name: Auto Trading Bot

on:
  schedule:
    - cron: "45 3 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "full_session = loop every 3 min | scan_once = single scan"
        required: false
        default: "full_session"
        type: choice
        options:
          - full_session
          - scan_once
      max_minutes:
        description: "Loop length (full_session only); 0 = until market close"
        required: false
        default: "0"

permissions:
  contents: read

concurrency:
  group: intraday-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 400
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
      DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
      DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
      UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
      UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
      UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
      UPSTOX_REDIRECT_URI: ${{ secrets.UPSTOX_REDIRECT_URI }}
      FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
      FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      OPTION_DATA_PROVIDER: upstox
      UPSTOX_WS_ENABLED: "true"
      UPSTOX_WS_MODE: "ltpc"
      UPSTOX_WS_WARMUP_SEC: "2.5"
      UPSTOX_WS_WAIT_SEC: "2"
      UPSTOX_AUTO_TRADE_ENABLED: "true"
      UPSTOX_PAPER_TRADE: "false"
      TELEGRAM_COMMANDS_ENABLED: "true"
      UPSTOX_DEFAULT_LOTS: "1"
      UPSTOX_NIFTY_LOT_SIZE: "65"
      UPSTOX_SENSEX_LOT_SIZE: "20"
      NIFTY_ST_ENGINE: exit490
      NIFTY_EXIT490_ATR_BARS: "1"
      NIFTY_EXIT490_ATR_MULT: "3"
      NIFTY_OPTION_PREMIUM_SL_POINTS: "15"
      NIFTY_OPTION_PREMIUM_TARGET_POINTS: "30"
      NIFTY_OPTION_PREMIUM_TRAIL_MAX_POINTS: "100"
      SCAN_UNIVERSE_MODE: nse_price_band
      MIN_STOCK_PRICE: "100"
      MAX_STOCK_PRICE: "1500"
      SEND_SCAN_SUMMARY: "false"
      SEND_DAILY_SUMMARY: "true"
      SEND_PREMARKET_MARKET_SUMMARY: "true"
      SEND_SESSION_ALERTS: "false"
      SEND_HEALTH_CHECK: "false"
      SEND_BOOT_ALERT: "false"
      NIFTY_OPTIONS_ENABLED: "true"
      SENSEX_OPTIONS_ENABLED: "true"
      EMA_MACD_OPTIONS_ENABLED: "true"
      EMA_MACD_INTERVAL: "3m"
      EMA_MACD_FAST_LENGTH: "34"
      EMA_MACD_SLOW_LENGTH: "144"
      EMA_MACD_SIGNAL_LENGTH: "9"
      EMA_MACD_USE_HEIKIN: "true"
      SENSEX_STRIKE_STEP: "100"
      EOD_SUMMARY_AFTER_HOUR: "15"
      EOD_SUMMARY_AFTER_MINUTE: "32"
      NIFTY_BTST_ENABLED: "true"
      SENSEX_BTST_ENABLED: "true"
      INDEX_BTST_MIN_GAP_PROB: "55"
      INDEX_BTST_LOT_GUIDANCE_PCT: "25-50"
      STOCK_BTST_ENABLED: "true"
      STOCK_BTST_MIN_CONFIRM_PCT: "75"
      STOCK_BTST_MIN_GAIN_PCT: "1.5"
      STOCK_BTST_MAX_ALERTS: "3"
      STOCK_BTST_MIN_PRICE: "50"
      STOCK_BTST_MAX_PRICE: "1000"
      STOCK_BTST_SCREEN_TOP: "50"
      STOCK_BTST_MIN_GAPUP_SCORE: "4.0"
      GLOBAL_ASSETS_ENABLED: "true"
      GLOBAL_ALERT_START_HOUR: "7"
      GLOBAL_ALERT_START_MINUTE: "0"
      GLOBAL_ALERT_END_HOUR: "23"
      GLOBAL_ALERT_END_MINUTE: "0"
      GLOBAL_HTF_INTERVAL: "4h"
      GLOBAL_ENTRY_INTERVAL: "30m"
      GLOBAL_RR_RATIO: "2"
      GLOBAL_FRACTAL_BARS: "2"
      GLOBAL_ENGULF_ATR_MULT: "0.35"
      GLOBAL_LONDON_START_HOUR: "8"
      GLOBAL_LONDON_END_HOUR: "16"
      GLOBAL_NY_START_HOUR: "13"
      GLOBAL_NY_END_HOUR: "22"
      GLOBAL_ENABLE_BUY: "true"
      GLOBAL_ENABLE_SELL: "true"
      GLOBAL_CRYPTO_24H: "true"
      GLOBAL_M30_LOOKBACK_BARS: "96"
      GLOBAL_DEDUP_ENTRY_PCT: "0.35"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_STOCK_ENABLED: "true"
      GEMINI_STOCK_SELECTION: "true"
      GEMINI_STOCK_RANK: "true"
      GEMINI_STOCK_ALERTS: "true"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.1-8b-instant
      GROQ_FALLBACK_ENABLED: "true"
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      CEREBRAS_MODEL: llama-3.3-70b
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      GH_MODELS_MODEL: meta-llama/llama-3.3-70b-instruct
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: openrouter/free
      LLM_PROVIDER_ORDER: cerebras,openrouter,github_models,groq,gemini
      AI_SIGNAL_VALIDATE: "false"
      AI_MIN_CONFIDENCE: "5"
      SCAN_ALL_UNIVERSE_INTRADAY: "true"
      EMA_INTERVAL: "5m"
      YFINANCE_MIN_INTERVAL_SEC: "0.45"
      YFINANCE_MAX_RETRIES: "4"
      USE_TRADE_FILTERS: "true"
      REQUIRE_FNO_ELIGIBLE: "true"
      REQUIRE_INTRADAY_MARGIN: "true"
      SCAN_STRATEGIES: all
      MIN_STRATEGIES_TO_CONFIRM: "1"
      MIN_STOCK_MOVE_POTENTIAL_PCT: "1.5"
      MIN_TARGET_PROFIT_PCT: "1.5"
      EMA_MIN_TARGET_PROFIT_PCT: "1.5"
      EMA_MAX_TARGET_PROFIT_PCT: "3"
      EMA_MAX_SL_PCT: "0.5"
      MAX_DAILY_BUY_SIGNALS: "10"
      MAX_BUY_ALERTS_PER_SCAN: "2"
      MAX_SELL_ALERTS_PER_SCAN: "1"
      SLTP_CLOSE_ALERT_TELEGRAM: "false"
      SCANNER_DATA_DIR: data
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      GITHUB_ACTIONS: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Log run
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "IST: $(TZ=Asia/Kolkata date '+%A %Y-%m-%d %H:%M:%S %Z')"

      - name: IST date for cache
        id: ist_date
        run: echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
          restore-keys: scanner-data-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Minutes until market close (IST)
        id: duration
        run: |
          NOW=$(TZ=Asia/Kolkata date +%s)
          CLOSE=$(TZ=Asia/Kolkata date -d "15:30" +%s 2>/dev/null || TZ=Asia/Kolkata date -d "$(TZ=Asia/Kolkata date +%Y-%m-%d) 15:30:00" +%s)
          DIFF=$(( (CLOSE - NOW) / 60 ))
          if [ "$DIFF" -lt 30 ]; then DIFF=30; fi
          if [ "$DIFF" -gt 390 ]; then DIFF=390; fi
          echo "mins=$DIFF" >> "$GITHUB_OUTPUT"
          echo "Minutes until 15:30 IST: $DIFF"

      - name: Refresh NSE universe (Rs 100-1500, skip if cached)
        run: |
          if [ -f data/nse_universe_price_band.json ]; then
            echo "Price-band cache present — skip slow refresh"
          else
            python scripts/refresh_nse_universe.py
          fi

      - name: Automation boot (once per day)
        run: python automation_boot.py

      - name: Telegram commands ready (delete webhook)
        run: python scripts/telegram_delete_webhook.py

      - name: Pre-market news summary (9:10-9:35 IST, once)
        run: |
          mkdir -p data
          python scripts/send_premarket_summary.py || true

      - name: Single scan
        if: github.event.inputs.mode == 'scan_once'
        run: |
          mkdir -p data
          python scanner.py

      - name: Scan loop every 3 min until market close
        if: github.event_name == 'schedule' || github.event.inputs.mode != 'scan_once'
        run: |
          mkdir -p data
          MINS="${{ github.event.inputs.max_minutes }}"
          if [ -z "$MINS" ] || [ "$MINS" = "0" ]; then
            MINS="${{ steps.duration.outputs.mins }}"
          fi
          echo "Running session loop for $MINS minutes"
          python session_runner.py --max-minutes "$MINS"
