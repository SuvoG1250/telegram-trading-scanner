# Automatic intraday scanner — runs every 5 min during NSE hours (Mon–Fri).
# Short jobs are more reliable than one 6-hour GitHub job.

name: Auto Trading Bot

on:
  schedule:
    # Every 5 min, 03:00–10:55 UTC ≈ 8:30 AM–4:25 PM IST (covers 9:15–3:30 market)
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "scan_once = one scan | full_session = loop until max_minutes"
        required: false
        default: "full_session"
        type: choice
        options:
          - scan_once
          - full_session
      max_minutes:
        description: "Full session length (only if mode=full_session)"
        required: false
        default: "275"

permissions:
  contents: read

concurrency:
  group: intraday-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
      SCANNER_DATA_DIR: data
      GITHUB_EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Log run
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "IST: $(TZ=Asia/Kolkata date '+%A %Y-%m-%d %H:%M:%S %Z')"
          echo "Mode: ${{ github.event.inputs.mode || 'scan_once (scheduled)' }}"

      - name: IST date for cache
        id: ist_date
        run: echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
          restore-keys: scanner-data-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Automation boot (once per day)
        if: github.event_name == 'schedule' || github.event.inputs.mode != 'full_session'
        run: python automation_boot.py

      - name: Single scan (automatic every 5 min)
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'scan_once'
        run: |
          mkdir -p data
          python scanner.py

      - name: Full session loop (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full_session'
        run: |
          mkdir -p data
          python session_runner.py --max-minutes "${{ github.event.inputs.max_minutes }}"
