name: Trading Scanner Bot

on:
  schedule:
    # Mon–Fri: every 5 min during UTC 3–10 (~8:30–15:30 IST)
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:

concurrency:
  group: trading-scanner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: IST date for cache key
        id: ist_date
        run: echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore scanner state
        uses: actions/cache/restore@v4
        id: scanner_cache
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
          restore-keys: |
            scanner-data-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scanner Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          SCANNER_DATA_DIR: data
        run: |
          mkdir -p data
          python scanner.py

      - name: Save scanner state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: scanner-data-${{ steps.ist_date.outputs.date }}
