# Manual test only — use "Auto Trading Bot" for automatic runs.
name: Trading Scanner Bot (Manual Test)

on:
  workflow_dispatch:
    inputs:
      send_test_signal:
        description: "Send test Telegram signal only"
        required: false
        default: false
        type: boolean
      run_scanner_once:
        description: "Run scanner once (no loop)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
      SCANNER_DATA_DIR: data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Execute
        run: |
          mkdir -p data
          if [ "${{ github.event.inputs.send_test_signal }}" = "true" ]; then
            python send_test_signal.py
          elif [ "${{ github.event.inputs.run_scanner_once }}" = "true" ]; then
            python scanner.py
          else
            python send_test_signal.py
          fi
